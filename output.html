<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: 'NotoSerifKR';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NotoSerifKR.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pretendard-Regular';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }
       body {
           font-family:'Pretendard-Regular';
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top:15px;
            font-size: 12px;
            font-family: monospace;
        }
       input[type="file"] {
            font-size: 20px;
            font-family: 'NotoSerifKR';
            border: none;
        }
       input[type="file"]::file-selector-button {
            background-color: #0078D4;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px; 

            align-items: center;
            gap: 8px;
        }        

       input[type="file"]::file-selector-button:hover {  background-color: #005a9e;  }
        #question {
            padding: 10px;
            font-size: 30pt;
            font-family:'Pretendard-Regular';
            line-height: 1.5;
            background-size: auto 90%;
            background-position: left top;
            background-repeat: no-repeat;
            margin-top:10px;
        }
        input[type="text"] {
            padding: 20px;
            font-size: 25px;
            font-family: 'NotoSerifKR';
            width: 70%;

            border-radius: 15pt;
            background-color: rgba(230, 230, 230, 0.7);
            border: none;
        }

        button  {
            background-color: #0078D4;
            color: white;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;
         //   margin-top: 10px;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: #005a9e;
        }
        #nextButton {
            display: none;
            margin-top: 10px;
        }

        .number { color: #0078D6; font-weight: bold; }
        iframe {width:100%; height:500pt;border:none;}
</style>
</head>
<body>
  
    <div id="quiz-container">
        <div id="question"></div>
        <input type="text" id="answer" placeholder="정답을 입력하세요" oninput="autoCheckAnswer()">
  
        <button id="nextButton" onclick="nextQuestion()">다음 문제</button>
 
    </div>

    <script>
        const questions = [{question:"문제입력 (정답1)",answer:"1"},{question:"문제입력 (정답2)",answer:"2"},];        
        let currentQuestionIndex = 0;

        function loadQuestion() {
            document.getElementById("question").innerHTML = 
                `<span class="number">${currentQuestionIndex + 1}</span> ${questions[currentQuestionIndex].question}`;
            document.getElementById("answer").value = "";

            document.getElementById("nextButton").style.display = "none";
        }     function autoCheckAnswer() {
            const userAnswer = document.getElementById("answer").value.trim();
            if (userAnswer === questions[currentQuestionIndex].answer) {
              
                document.getElementById("nextButton").style.display = "block";
               document.getElementById('question').style.backgroundImage = "url('https://tistory2.daumcdn.net/tistory/4700529/skin/images/check-O.png')";
            } else {
                document.getElementById("nextButton").style.display = "none";
                document.getElementById('question').style.backgroundImage ='none';
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
                document.getElementById('question').style.backgroundImage ='none';
            } else {
                document.getElementById("quiz-container").innerHTML = "<h2>모든 문제를 풀었습니다!</h2>";
            }
        }

        loadQuestion();
    </script>
</body>
</html>
