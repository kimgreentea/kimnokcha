<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8"><style>


        @font-face {
            font-family: 'NotoSerifKR';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NotoSerifKR.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pretendard-Regular';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }
       
       body {
           font-family:'Pretendard-Regular';
        }

        .question {
            padding: 20px;
            font-size: 15pt;
            font-family: 'NotoSerifKR';
            line-height: 1.6;
            background-size: auto;
            background-position: left top;
            background-repeat: no-repeat;
        }

        .question input[type="radio"] {
            margin-right: 10px;
            width: 15px; /* 버튼 크기 조정 */
            height: 15px; /* 버튼 크기 조정 */
            accent-color: #0078D6;
       }           

        .question.correct {
            background-image: url('https://tistory2.daumcdn.net/tistory/4700529/skin/images/check-O.png');
        }

        .question.wrong {
            background-image: url('https://tistory2.daumcdn.net/tistory/4700529/skin/images/check-X.png');
        }

        .moonje {
            font-family: 'Pretendard-Regular';
            font-size: 20pt;
            margin-bottom: 15px;
        }

        .number {
            font-family: 'Pretendard-Regular';
            font-size: 20pt;
            margin-bottom: 15px;
            margin-right: 10px;
            color: #0078D6;
            font-weight: bold;
            vertical-align: top;
            width: 40px;
        }

        .bogi {
            display: block;
            margin-bottom: 10px;
            padding: 20px;
            border-radius: 10px;
            background-color: rgba(230, 230, 230, 0.7);
        }

        .question label {
            display: block;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 10px;
        }

        input[type="text"] {
            padding: 20px;
            font-size: 20px;
            font-family: 'NotoSerifKR';
            width: 100%;
            max-width: calc(100% - 40px);
            border-radius: 15pt;
            background-color: rgba(230, 230, 230, 0.7);
            border: none;
            margin-bottom: 15pt;
        }

        input[type="file"] {
            font-size: 20px;
            font-family: 'NotoSerifKR';
            border: none;
        }
       input[type="file"]::file-selector-button {
            background-color: #0078D4;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;

            align-items: center;
            gap: 8px;
        }        

       input[type="file"]::file-selector-button:hover {  background-color: #005a9e;  }

        /* 클릭한 답변 배경색 */
        .question label.selected {
            background-color: rgba(230, 230, 230, 0.7);
        }

        textarea {
            width: 100%;
            height: 200px;
            font-size: 12px;
            font-family: monospace;
        }

        button  {
            background-color: #0078D4;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: #005a9e;
        }



    </style>
<div id="quiz"><div class="question">
            <span class="number">1</span><span class="moonje">객관식1</span><label><input type="radio" name="q1" value="1">보기는</label><label><input type="radio" name="q1" value="2">최대</label><label><input type="radio" name="q1" value="3">5번까지</label><label><input type="radio" name="q1" value="4">사용가능</label></div><div class="question">
            <span class="number">2</span><span class="moonje">주관식(정답 1)</span><input type="text" name="q2" class="subjective-input" placeholder="정답을 입력하세요"></div></div>
    <script>
/* 문제채점용*/
        const answers = {"q1":"1","q2":"1"};
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('wrong');
                }
            });
        });
let currentQuestion = 0;
const questions = document.querySelectorAll('.question');

/* 처음엔 첫 문제만 보이기 */
questions.forEach((q,i)=>{
    if(i!==0) q.style.display="none";
});

/* 다음 문제 버튼 생성 */
function showNextButton(questionDiv){
    if(questionDiv.querySelector('.next-btn')) return;

    const btn=document.createElement("button");
    btn.textContent="다음 문제";
    btn.className="next-btn";

btn.onclick=function(){

    questions[currentQuestion].style.display="none";
    currentQuestion++;

    if(questions[currentQuestion]){
        questions[currentQuestion].style.display="block";
    }else{
        document.getElementById("quiz").innerHTML += "<h2>모든 문제를 풀었습니다!</h2>";
    }

    btn.remove();
};
    questionDiv.appendChild(btn);
}

/* 다음 문제 버튼 제거 */
function removeNextButton(questionDiv){
    const btn = questionDiv.querySelector('.next-btn');
    if(btn){
        btn.remove();
    }
}


/* 객관식 */
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                    showNextButton(questionDiv);
                } else {
                    questionDiv.classList.add('wrong');
                    removeNextButton(questionDiv);
                }
            });
        });

/* 주관식 */
        document.querySelectorAll('.subjective-input').forEach(input => {
            input.addEventListener('input', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const userAnswer = this.value.trim();
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct');
                if (userAnswer === correctAnswer) {
                    questionDiv.classList.add('correct');
                    showNextButton(questionDiv);
                } else {
                    removeNextButton(questionDiv);
                }
            });
        });




    </script></body></html>
