<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css"></head>
 <body>   <div class="container">

  
<div id="comment-section" data-article-id="post_00c">
  <h3></h3>
  
  <input type="text" id="nickname" placeholder="이름" style="width:300pt;">
 
  <textarea id="comment-content" placeholder="내용을 입력하세요. 등록 후 수정할 수 없으니 다시 한번 확인하세요." 
   style="margin-top:10pt;font-size:16pt; padding:10pt;resize:none; 
   width:calc(100% - 25pt);border-radius:20pt;font-family: 'Pretendard-Regular';">></textarea>
  
  <div style="text-align:right;">
  <button id="submit-btn" style>등록</button></div>


  <div id="comment-list">
   
  </div>
</div>


  
<div id="quiz"><div class="question">
            <span class="number">1</span><span class="moonje">1+1=</span><label><input type="radio" name="q1" value="1">1</label><label><input type="radio" name="q1" value="2">2</label><label><input type="radio" name="q1" value="3">3</label><label><input type="radio" name="q1" value="4">4</label></div><div class="question">
            <span class="number">2</span><span class="moonje">2+1=</span><label><input type="radio" name="q2" value="1">1</label><label><input type="radio" name="q2" value="2">2</label><label><input type="radio" name="q2" value="3">3</label><label><input type="radio" name="q2" value="4">4</label><label><input type="radio" name="q2" value="5">5</label></div><div class="question">
            <span class="number">3</span><span class="moonje">2X3=</span><input type="text" name="q3" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">4</span><span class="moonje">우리 학교 이름은?</span><input type="text" name="q4" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">5</span><span class="moonje">선생님의 은혜는?</span><label><input type="radio" name="q5" value="1">높음</label><label><input type="radio" name="q5" value="2">짱높음</label><label><input type="radio" name="q5" value="3">짱짱높음</label></div></div>
    </div>
        <script>
        const answers = {"q1":"1","q2":"3","q3":"6","q4":"은여울초등학교","q5":"3"};
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('wrong');
                }
            });
        });

        document.querySelectorAll('.subjective-input').forEach(input => {
            input.addEventListener('input', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const userAnswer = this.value.trim();
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct');
                if (userAnswer === correctAnswer) {
                    questionDiv.classList.add('correct');
                }
            });
        });


  // 수파베이스
  const SUPABASE_URL = 'https://naiaomvbsjrrtgdxttoy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_B_vOoZCCTQLB0E3Nn1lMRw_eS9rMAGc';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const commentSection = document.getElementById('comment-section');
  const articleId = commentSection ? commentSection.getAttribute('data-article-id') : 'default_post';

  async function loadComments() {
    const listDiv = document.getElementById('comment-list');
    
    const { data, error } = await db
      .from('nokcha.rep')
      .select('*')
      .eq('article_num', articleId)
      .order('created_at', { ascending: false }); 

    if (error) {
      console.error('불러오기 에러:', error.message);
      listDiv.innerHTML = '<p>댓글을 불러오지 못했어 ㅠㅠ</p>';
      return;
    }

    if (data.length === 0) {
      listDiv.innerHTML = '<p style="color: #999;">아직 댓글이 없네? 첫 댓글의 주인공이 되어봐 ㅋㅋㅋ</p>';
      return;
    }


    listDiv.innerHTML = data.map(c => `
      <div style="padding: 15px; border-bottom: 1px solid #eee; margin-bottom: 10px;">
        <strong style="color: #333;">${c.name}</strong> 
        <small style="color: #999; margin-left: 10px;">${new Date(c.created_at).toLocaleString()}</small>
        <p style="margin: 8px 0 0; line-height: 1.5;">${c.content}</p>
      </div>
    `).join('');
  }


  async function saveComment() {
    const nameInput = document.getElementById('nickname');
    const contentInput = document.getElementById('comment-content');
    const submitBtn = document.getElementById('submit-btn');

    const name = nameInput.value.trim();
    const content = contentInput.value.trim();

    if (!name || !content) {
      alert('이름이랑 내용을 입력해줘 ㅋㅋㅋ');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = '등록 중';

    const { error } = await db
      .from('nokcha.rep')
      .insert([
        { 
          name: name, 
          content: content, 
          article_num: articleId 
        }
      ]);

    if (error) {
      alert('저장 실패: ' + error.message);
    } else {
      nameInput.value = '';
      contentInput.value = '';
      await loadComments();
    }

    submitBtn.disabled = false;
    submitBtn.innerText = '등록하기';
  }

  document.getElementById('submit-btn').addEventListener('click', saveComment);
  window.addEventListener('DOMContentLoaded', loadComments);

    </script></body></html>
