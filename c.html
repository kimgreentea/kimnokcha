<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8">
<link rel="stylesheet" href="css/style.css"></head>
    <div class="container">
        <body>
<div id="quiz"><div class="question">
            <span class="number">1</span><span class="moonje">객관식103242158</span><label><input type="radio" name="q1" value="1">보기는</label><label><input type="radio" name="q1" value="2">최대</label><label><input type="radio" name="q1" value="3">5번까지</label><label><input type="radio" name="q1" value="4">사용가능</label></div><div class="question">
            <span class="number">2</span><span class="moonje">객관식2</span><label><input type="radio" name="q2" value="1">보기에</label><label><input type="radio" name="q2" value="2">아무것도</label><label><input type="radio" name="q2" value="3">적히지않으면</label><label><input type="radio" name="q2" value="4">주관식으로</label><label><input type="radio" name="q2" value="5">처리합니다</label></div><div class="question">
            <span class="number">3</span><span class="moonje">주관식(정답 1)</span><input type="text" name="q3" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">4</span><span class="moonje">정답은 안녕하세요</span><input type="text" name="q4" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">5</span><span class="moonje">객관식3</span><label><input type="radio" name="q5" value="1">중간부터</label><label><input type="radio" name="q5" value="2">채운경우</label><label><input type="radio" name="q5" value="3">이게3번입니다</label></div></div>
    </div>
        <script>
        const answers = {"q1":"1","q2":"3","q3":"1","q4":"안녕하세요","q5":"3"};
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('wrong');
                }
            });
        });

        document.querySelectorAll('.subjective-input').forEach(input => {
            input.addEventListener('input', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const userAnswer = this.value.trim();
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct');
                if (userAnswer === correctAnswer) {
                    questionDiv.classList.add('correct');
                }
            });
        });
    </script></body></html>
