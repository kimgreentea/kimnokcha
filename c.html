<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css"></head>
 <body>   <div class="container">
 
<div id="quiz"><div class="question">
            <span class="number">1</span><span class="moonje">1+1=</span><label><input type="radio" name="q1" value="1">1</label><label><input type="radio" name="q1" value="2">2</label><label><input type="radio" name="q1" value="3">3</label><label><input type="radio" name="q1" value="4">4</label></div><div class="question">
            <span class="number">2</span><span class="moonje">2+1=</span><label><input type="radio" name="q2" value="1">1</label><label><input type="radio" name="q2" value="2">2</label><label><input type="radio" name="q2" value="3">3</label><label><input type="radio" name="q2" value="4">4</label><label><input type="radio" name="q2" value="5">5</label></div><div class="question">
            <span class="number">3</span><span class="moonje">2X3=</span><input type="text" name="q3" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">4</span><span class="moonje">우리 학교 이름은?</span><input type="text" name="q4" class="subjective-input" placeholder="정답을 입력하세요"></div><div class="question">
            <span class="number">5</span><span class="moonje">선생님의 은혜는?</span><label><input type="radio" name="q5" value="1">높음</label><label><input type="radio" name="q5" value="2">짱높음</label><label><input type="radio" name="q5" value="3">짱짱높음</label></div></div>
    </div>
        <script>
        const answers = {"q1":"1","q2":"3","q3":"6","q4":"은여울초등학교","q5":"3"};
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('wrong');
                }
            });
        });

        document.querySelectorAll('.subjective-input').forEach(input => {
            input.addEventListener('input', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const userAnswer = this.value.trim();
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct');
                if (userAnswer === correctAnswer) {
                    questionDiv.classList.add('correct');
                }
            });
        });
    </script></body></html>
