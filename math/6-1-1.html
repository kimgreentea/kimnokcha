            font-style: normal;

            font-style: normal;
        }
       body {
           font-family:'Pretendard-Regular';display:flex;justify-content:center;
        }
        .quiz-container {width:min(90%,860px);}
        textarea {
            width: 100%;
            height: 200px;
            margin-top:15px;
            font-size: 12px;
            font-family: monospace;
        }
       input[type="file"] {
            font-size: 20px;
            font-family: 'NotoSerifKR';
            border: none;
        }

            background-color: #0078D4;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;  

            align-items: center;
            gap: 8px;
        }

        #question {
            padding: 10px;
            font-size: 30pt;
            font-family:'Pretendard-Regular';
            line-height: 1.5;
            background-size: auto 90%;
            background-position: left top;
            background-repeat: no-repeat;
            margin-top:10px;
        }
        input[type="text"] {
            padding: 20px;
            font-size: 25px;
            font-family: 'NotoSerifKR';
            width: 35pt;
            text-align:center;
            border-radius: 5pt;
            background-color: rgba(230, 230, 230, 0.7);
            border: none;
        }

        button  {
            background-color: #0078D4;
            color: white;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;
         //   margin-top: 10px;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: #005a9e;
        }
        #nextButton {
            display: none;
            margin-top: 10px;
        }

        .number { color: #0078D6; font-weight: bold; }
        iframe {width:100%; height:500pt;border:none;}
</style>

               document.getElementById('question').style.backgroundImage = "url('https://tistory2.daumcdn.net/tistory/4700529/skin/images/check-O.png')";
            } else {
                document.getElementById("nextButton").style.display = "none";
                document.getElementById('question').style.backgroundImage ='none';
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
                document.getElementById('question').style.backgroundImage ='none';
            } else {
                document.getElementById("quiz-container").innerHTML = "<h2>모든 문제를 풀었습니다!</h2>";
            }
        }


// 배열 섞기 함수 (Fisher-Yates 알고리즘 사용)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// 문제 배열을 섞음
shuffleArray(questions);


        loadQuestion();
