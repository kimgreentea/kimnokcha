<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8"><style>




    </style>
<div id="quiz"><div class="question">
            <span class="number">1</span><span class="moonje">객관식1</span><label><input type="radio" name="q1" value="1">보기는</label><label><input type="radio" name="q1" value="2">최대</label><label><input type="radio" name="q1" value="3">5번까지</label><label><input type="radio" name="q1" value="4">사용가능</label></div><div class="question">
            <span class="number">2</span><span class="moonje">주관식(정답 1)</span><input type="text" name="q2" class="subjective-input" placeholder="정답을 입력하세요"></div></div>
    <script>
/* 문제채점용*/
        const answers = {"q1":"1","q2":"1"};
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('wrong');
                }
            });
        });
let currentQuestion = 0;
const questions = document.querySelectorAll('.question');

/* 처음엔 첫 문제만 보이기 */
questions.forEach((q,i)=>{
    if(i!==0) q.style.display="none";
});

/* 다음 문제 버튼 생성 */
function showNextButton(questionDiv){
    if(questionDiv.querySelector('.next-btn')) return;

    const btn=document.createElement("button");
    btn.textContent="다음 문제";
    btn.className="next-btn";

btn.onclick=function(){

    questions[currentQuestion].style.display="none";
    currentQuestion++;

    if(questions[currentQuestion]){
        questions[currentQuestion].style.display="block";
    }else{
        document.getElementById("quiz").innerHTML += "<h2>모든 문제를 풀었습니다!</h2>";
    }

    btn.remove();
};
    questionDiv.appendChild(btn);
}

/* 다음 문제 버튼 제거 */
function removeNextButton(questionDiv){
    const btn = questionDiv.querySelector('.next-btn');
    if(btn){
        btn.remove();
    }
}


/* 객관식 */
        document.querySelectorAll('.question input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const selectedValue = this.value;
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct', 'wrong');
                questionDiv.querySelectorAll('label').forEach(label => label.classList.remove('selected'));
                this.parentElement.classList.add('selected');
                
                if (selectedValue === correctAnswer) {
                    questionDiv.classList.add('correct');
                    showNextButton(questionDiv);
                } else {
                    questionDiv.classList.add('wrong');
                    removeNextButton(questionDiv);
                }
            });
        });

/* 주관식 */
        document.querySelectorAll('.subjective-input').forEach(input => {
            input.addEventListener('input', function() {
                const questionDiv = this.closest('.question');
                const questionName = this.name;
                const userAnswer = this.value.trim();
                const correctAnswer = answers[questionName];
                
                questionDiv.classList.remove('correct');
                if (userAnswer === correctAnswer) {
                    questionDiv.classList.add('correct');
                    showNextButton(questionDiv);
                } else {
                    removeNextButton(questionDiv);
                }
            });
        });




    </script></body></html>
